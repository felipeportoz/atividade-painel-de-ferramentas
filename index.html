<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ferramentas</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>

        <button id="tema-btn">
            🌙
        </button>
    </header>

    <main>

        <aside>

            <button data-target="moedas">Moedas</button>

            <button data-target="imc">IMC</button>

            <button data-target="temperatura">Temperatura</button>

            <button data-target="velocidade">Velocidade</button>

            <button data-target="massa">Massa</button>

            <button data-target="regra-tres">Regra de Três</button>

        </aside>

        <section class="content">

            <section id="moedas" class="screen active">
                <h2>Conversor de Moedas</h2>

                <div class="moeda-box">

                    <input type="number" id="valor-moeda" placeholder="Digite o valor" step="0.01">

                    <select id="tipo-conversao">

                        <option value="usd-brl">
                            USD → BRL
                        </option>

                        <option value="brl-usd">
                            BRL → USD
                        </option>

                    </select>

                    <button id="btn-converter">
                        Converter
                    </button>

                    <p id="cotacao">
                        Cotação: carregando...
                    </p>

                    <p id="resultado-moeda"></p>

                </div>
            </section>

            <section id="imc" class="screen">
                <h2>Cálculo de IMC</h2>
                <input type="number" name="peso" id="peso" placeholder="Peso (kg)">
                <input type="number" name="altura" id="altura" placeholder="Altura (m)">
                <button id="calcular-imc">Calcular</button>
                <p id="resultado-imc"></p>
            </section>

            <section id="temperatura" class="screen">
                <h2>Conversor de Temperatura</h2>
            </section>

            <section id="velocidade" class="screen">
                <h2>Conversor de Velocidade</h2>
            </section>

            <section id="massa" class="screen">
                <h2>Conversor de Massa</h2>
            </section>

            <section id="regra-tres" class="screen">
                <h2>Regra de Três</h2>
            </section>

        </section>

    </main>

    <footer>
        <p>DESENVOLVIDO POR FELIPE PORTO</p>
    </footer>


</body>

</html>
