<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Ferramentas</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Painel de Ferramentas</h1>

        <button id="tema-btn">
            🌙
        </button>
    </header>

    <main>

        <aside>

            <button data-target="moedas">Moedas</button>

            <button data-target="imc">IMC</button>

            <button data-target="temperatura">Temperatura</button>

            <button data-target="velocidade">Velocidade</button>

            <button data-target="massa">Massa</button>

            <button data-target="regra-tres">Regra de Três</button>

        </aside>

        <section class="content">

            <section id="moedas" class="screen active">

                <h2>Conversor de Moedas</h2>

                <input type="number" id="valorMoeda" placeholder="Digite o valor">

                <select id="tipoConversao">

                    <option value="usd">
                        USD → BRL
                    </option>

                    <option value="brl">
                        BRL → USD
                    </option>

                </select>

                <button id="btnConverter">
                    Converter
                </button>

                <p id="cotacaoAtual">
                    Cotação atual: --
                </p>

                <p id="resultadoMoeda"></p>

            </section>

            <section id="imc" class="screen">

                <h2>Cálculo de IMC</h2>

                <input type="number" id="peso" placeholder="Peso (kg)">

                <input type="number" id="altura" placeholder="Altura (m)" step="0.01">

                <select id="genero">

                    <option value="homem">
                        Homem
                    </option>

                    <option value="mulher">
                        Mulher
                    </option>

                </select>

                <button id="btnImc">
                    Calcular IMC
                </button>

                <p id="resultadoImc"></p>

            </section>

            <section id="temperatura" class="screen">

                <h2>Conversor de Temperatura</h2>

                <input type="number" id="valorTemperatura" placeholder="Digite a temperatura">

                <select id="tipoTemperatura">

                    <option value="celsius">
                        Celsius → Fahrenheit
                    </option>

                    <option value="fahrenheit">
                        Fahrenheit → Celsius
                    </option>

                </select>

                <button id="btnTemperatura">
                    Converter
                </button>

                <p id="resultadoTemperatura"></p>

            </section>

            <section id="velocidade" class="screen">

                <h2>Conversor de Velocidade</h2>

                <input type="number" id="valorVelocidade" placeholder="Digite a velocidade">

                <select id="tipoVelocidade">

                    <option value="km">
                        Km/h → MPH
                    </option>

                    <option value="mph">
                        MPH → Km/h
                    </option>

                </select>

                <button id="btnVelocidade">
                    Converter
                </button>

                <p id="resultadoVelocidade"></p>

            </section>

            <section id="massa" class="screen">

                <h2>Conversor de Massa</h2>

                <input type="number" id="valorMassa" placeholder="Digite a massa">

                <select id="tipoMassa">

                    <option value="kg">
                        Kg → Libras
                    </option>

                    <option value="lbs">
                        Libras → Kg
                    </option>

                </select>

                <button id="btnMassa">
                    Converter
                </button>

                <p id="resultadoMassa"></p>

            </section>

            <section id="regra-tres" class="screen">
                <h2>Regra de Três</h2>
            </section>

        </section>

    </main>

    <footer>
        <p>DESENVOLVIDO POR FELIPE PORTO</p>
    </footer>


</body>

</html>
